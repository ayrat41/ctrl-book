version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ctrl-book-db
    environment:
      POSTGRES_USER: ctrlbook
      POSTGRES_PASSWORD: ctrlpassword
      POSTGRES_DB: booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
